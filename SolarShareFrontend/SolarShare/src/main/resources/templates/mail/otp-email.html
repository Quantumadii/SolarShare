<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>OTP Verification</title>
</head>
<body style="margin:0;padding:0;background:#f4faf6;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="padding:24px;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;border:1px solid #d9efe0;overflow:hidden;">
                <tr>
                    <td style="background:linear-gradient(90deg,#10b981,#14b8a6);padding:18px 24px;color:#fff;font-size:20px;font-weight:700;">SolarShare OTP Verification</td>
                </tr>
                <tr>
                    <td style="padding:24px;color:#1f2937;line-height:1.6;">
                        <p>Hello,</p>
                        <p>Use the OTP below to verify your signup email address:</p>
                        <div style="margin:20px 0;padding:14px 18px;background:#ecfdf5;border:1px dashed #10b981;border-radius:10px;display:inline-block;font-size:28px;letter-spacing:4px;font-weight:700;color:#065f46;" th:text="${otp}">123456</div>
                        <p>This OTP is valid for 10 minutes.</p>
                        <p>If you did not request this, please ignore this email.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
